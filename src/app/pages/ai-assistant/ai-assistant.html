<div class="ai-page">

    <h2 class="page-title">🤖 AI Assistant</h2>
    <p class="subtitle">
      Ask doubts and get guidance for your exam preparation
    </p>
  
    <!-- CHAT BOX -->
    <div class="chat-box">
      <div
        *ngFor="let msg of messages"
        class="message"
        [ngClass]="msg.sender"
      >
        {{ msg.text }}
      </div>
    </div>
    <br />
  
    <!-- INPUT -->
    <div class="input-box">
      <input
        type="text"
        placeholder="Type your question here..."
        [(ngModel)]="userInput"
        (keyup.enter)="sendMessage()"
      />
      <button (click)="sendMessage()">Send</button>
    </div>
  
  </div>
